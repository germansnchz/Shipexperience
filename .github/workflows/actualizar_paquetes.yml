
name: Robot Tripulante Ship - Actualización Red Evt

on:
  schedule:
    # 18:00 UTC son las 15:00 hs de Argentina
    - cron: '0 18 * * *'
  workflow_dispatch: # Te permite ejecutarlo manualmente desde GitHub si tenés una urgencia

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Navegador del Robot
        run: |
          npm install playwright
          npx playwright install chromium

      - name: Ejecutar Navegación en Red Evt
        env:
          RED_EVT_USER: ${{ secrets.RED_EVT_USER }}
          RED_EVT_PASS: ${{ secrets.RED_EVT_PASS }}
          EMBARQUES_PRIORITARIOS: "AEROPARQUE, EZEIZA, BUENOS AIRES, MENDOZA, SAN RAFAEL, ROSARIO, CORDOBA"
        run: |
          node robot.js

      - name: Guardar Novedades en la Web
        run: |
          git config --global user.name "Robot Tripulante Ship"
          git config --global user.email "bot@shipexperience.com.ar"
          git add paquetes.json
          git commit -m "Novedades de paquetes actualizadas automáticamente - $(date +'%d/%m/%Y')" || echo "Sin cambios"
          git push
